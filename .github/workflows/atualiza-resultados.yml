name: Atualiza Resultados (Copa 2026)

on:
  # A cada 5 min, BRT 12:00 a 02:00 (UTC 15:00 a 05:00 do dia seguinte).
  # 5 min é o mínimo permitido pelo GitHub Actions.

  schedule:
    # Junho 11-30 (fase de grupos)
    - cron: '*/5 15-23 11-30 6 *'   # tarde BRT
    - cron: '*/5 0-5  12-30 6 *'    # noite/madrugada BRT (próximo dia em UTC)

    # Julho 1-19 (mata-mata e final)
    - cron: '*/5 15-23 1-19 7 *'
    - cron: '*/5 0-5  2-20 7 *'

  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        env:
          FOOTBALL_DATA_TOKEN:  ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/update_results.py
