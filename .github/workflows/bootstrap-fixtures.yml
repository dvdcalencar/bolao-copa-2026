name: Bootstrap Mapping (manual)

# Esse workflow vincula cada jogo da base (id 1-72) ao external_fixture_id
# da API-Football. Rode UMA VEZ via "Run workflow" na aba Actions, depois
# pode esquecer — só roda se você disparar manualmente.

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bootstrap
        env:
          FOOTBALL_DATA_TOKEN:  ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/bootstrap_fixture_mapping.py
